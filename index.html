<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>טל & נטלי 💍</title>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #f7f3ef, #eef3ff);
      overflow-x: hidden;
      padding: 12px;
      color: #222;
    }

    /* קונפטי ברקע */
    #confetti-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    /* תוכן מעל הקונפטי */
    .container {
      max-width: 420px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-top: 12px;
      margin-bottom: 18px;
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .date {
      color: #777;
      font-size: 14px;
    }

    .message {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* BLOCKS */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 18px;
    }

    .block {
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .natali {
      background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    }

    .tal {
      background: linear-gradient(135deg, #eef3ff, #dde6ff);
    }

    .name {
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* BUTTONS */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;

      background: #fff;
      border-radius: 14px;
      padding: 14px;
      margin: 10px 0;

      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);

      border: 1px solid rgba(0,0,0,0.04);

      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    .logo {
      height: 24px;
    }

    /* CONFETTI */
    .confetti {
      position: absolute;
      top: -10px;
      border-radius: 2px;
      opacity: 0.75;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }

    /* MOBILE */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .title {
        font-size: 22px;
      }

      .block {
        padding: 14px;
      }
    }
  </style>
</head>

<body>

<!-- קונפטי רקע -->
<div id="confetti-layer"></div>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">טל גרופר & נטלי גבאי 💍</div>
    <div class="date">26.6.26</div>
    <div class="message">
      מתרגשים לחגוג את היום שלנו. תודה שאתם חלק מהרגע הזה 💐
    </div>
  </div>

  <!-- BLOCKS -->
  <div class="grid">

    <!-- NATALI -->
    <div class="block natali">
      <div class="name">נטלי</div>

      <a class="btn" href="https://links.payboxapp.com/sMQVA1jb0Ub">
        <img class="logo" src="Pay-box-logo@3x.webp" />
      </a>

      <a class="btn" href="https://www.bitpay.co.il/app/me/DCF1C51B-CB29-5C26-7258-5EF6B952E2ACE24A">
        <img class="logo" src="Bit_logo_2024.svg" />
      </a>
    </div>

    <!-- TAL -->
    <div class="block tal">
      <div class="name">טל</div>

      <a class="btn" href="https://links.payboxapp.com/4BKtCQg9XUb">
        <img class="logo" src="Pay-box-logo@3x.webp" />
      </a>

      <a class="btn" href="https://www.bitpay.co.il/app/me/24CD84B1-FA1A-1862-2D28-ECC3C74D66B8432A">
        <img class="logo" src="Bit_logo_2024.svg" />
      </a>
    </div>

  </div>

</div>

<script>
  const colors = ['#f7a8c4','#9bb1ff','#ffd1dc','#c7d2ff','#ffe4ec'];

  function createConfetti() {
    const el = document.createElement('div');

    const size = Math.random() * 5 + 3;

    el.className = 'confetti';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (Math.random() * 3 + 4) + 's';

    document.getElementById('confetti-layer').appendChild(el);

    setTimeout(() => el.remove(), 8000);
  }

  setInterval(() => {
    for (let i = 0; i < 2; i++) {
      createConfetti();
    }
  }, 300);
</script>

</body>
</html>

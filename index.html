<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>טל & נטלי 💍</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Assistant', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* HEADER עליון */
    .header {
      text-align: center;
      padding: 22px 16px 10px;
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .date {
      font-size: 14px;
      color: #777;
      margin-bottom: 8px;
    }

    .message {
      font-size: 14px;
      color: #666;
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* SPLIT */
    .split {
      flex: 1;
      display: flex;
    }

    .side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    .natali {
      background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    }

    .tal {
      background: linear-gradient(135deg, #eef3ff, #dde6ff);
    }

    .box {
      width: 100%;
      max-width: 340px;
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .card {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    .logo {
      height: 26px;
      width: auto;
    }

    @media (max-width: 800px) {
      .split {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- HEADER אחד בלבד -->
<div class="header">
  <div class="title">טל גרופר & נטלי גבאי 💍</div>
  <div class="date">26.6.26</div>
  <div class="message">
    אנחנו כל כך מתרגשים לחגוג איתכם את היום שלנו. תודה שאתם כאן איתנו 💐
  </div>
</div>

<!-- SPLIT -->
<div class="split">

  <!-- נטלי -->
  <div class="side natali">
    <div class="box">

      <a class="card" href="https://links.payboxapp.com/sMQVA1jb0Ub">
        <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
      </a>

      <a class="card" href="https://www.bitpay.co.il/app/me/DCF1C51B-CB29-5C26-7258-5EF6B952E2ACE24A">
        <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
      </a>

    </div>
  </div>

  <!-- טל -->
  <div class="side tal">
    <div class="box">

      <a class="card" href="https://links.payboxapp.com/4BKtCQg9XUb">
        <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
      </a>

      <a class="card" href="https://www.bitpay.co.il/app/me/24CD84B1-FA1A-1862-2D28-ECC3C74D66B8432A">
        <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
      </a>

    </div>
  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>טל & נטלי 💍</title>

  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Heebo', sans-serif;
      background: linear-gradient(135deg, #f7f3ef, #eef3ff);
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* כותרת */
    .header {
      text-align: center;
      margin-bottom: 20px;
      width: min(100%, 380px);
    }

    .title {
      font-size: 26px;
      font-weight: 600;
    }

    .date {
      color: #777;
      margin-top: 6px;
    }

    .message {
      margin-top: 10px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    /* בלוקים */
    .grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: min(100%, 380px);
    }

    .block {
      border-radius: 18px;
      padding: 18px;
      width: 100%;
    }

    .natali {
      background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    }

    .tal {
      background: linear-gradient(135deg, #eef3ff, #dde6ff);
    }

    .name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      text-align: center;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(6px);
      border-radius: 14px;
      padding: 16px;
      margin: 10px 0;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    .logo {
      height: 26px;
    }

    /* קונפטי */
    .confetti {
      position: fixed;
      top: -10px;
      width: 7px;
      height: 7px;
      border-radius: 2px;
      opacity: 0.8;
      animation: fall linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
      }
    }
  </style>
</head>

<body>

  <!-- header -->
  <div class="header">

  </div>

  <!-- cards -->
  <div class="grid">

    <!-- נטלי -->
    <div class="block natali">

        <img class="logo" src="Bit_logo_2024.svg" alt="Bit" />
      </a>
    </div>

  </div>

  <!-- קונפטי -->
  <script>
    const colors = ['#f7a8c4','#9bb1ff','#ffd1dc','#c7d2ff','#ffe4ec'];

    function createConfetti() {
      const el = document.createElement('div');
      el.className = 'confetti';

      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.width = el.style.height = (Math.random() * 6 + 4) + 'px';
      el.style.animationDuration = (Math.random() * 3 + 3) + 's';

      document.body.appendChild(el);
      setTimeout(() => el.remove(), 7000);
    }

    setInterval(() => {
      for (let i = 0; i < 4; i++) {
        createConfetti();
      }
    }, 150);
  </script>

</body>
</html>

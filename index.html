<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מתנה לחתונה</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Assistant', sans-serif;
      height: 100vh;
      display: flex;
    }

    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      position: relative;
      transition: all 0.2s ease;
      text-align: center;
      padding: 20px;
    }

    .half:hover {
      filter: brightness(1.05);
      transform: scale(1.01);
    }

    .tal {
      background: linear-gradient(135deg, #6a85f1, #9bb1ff);
    }

    .natali {
      background: linear-gradient(135deg, #f7a8c4, #ffd1dc);
    }

    .content {
      max-width: 260px;
    }

    .name {
      font-size: 34px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 16px;
      opacity: 0.95;
      margin-bottom: 10px;
    }

    .hint {
      font-size: 13px;
      opacity: 0.85;
    }

    /* מובייל */
    @media (max-width: 600px) {
      body {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<a class="half natali" href="https://links.payboxapp.com/sMQVA1jb0Ub">
  <div class="content">
    <div class="name">נטלי</div>
    <div class="desc">💐 ברכה לכלה</div>
    <div class="hint">לחצו להעברת מתנה</div>
  </div>
</a>

<a class="half tal" href="https://links.payboxapp.com/4BKtCQg9XUb">
  <div class="content">
    <div class="name">טל</div>
    <div class="desc">🥂 ברכה לחתן</div>
    <div class="hint">לחצו להעברת מתנה</div>
  </div>
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מתנה לחתונה</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Assistant', sans-serif;
      height: 100vh;
      display: flex;
    }

    .side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .natali {
      background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    }

    .tal {
      background: linear-gradient(135deg, #eef3ff, #dde6ff);
    }

    .box {
      width: 100%;
      max-width: 340px;
    }

    .name {
      font-size: 34px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 15px;
      color: #666;
      margin-bottom: 25px;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: white;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 14px;
      text-decoration: none;
      color: #333;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: all 0.2s ease;
      font-size: 15px;
      font-weight: 500;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    .logo {
      height: 22px;
      width: auto;
    }

    /* מובייל */
    @media (max-width: 800px) {
      body {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- נטלי -->
<div class="side natali">
  <div class="box">
    <div class="name">נטלי</div>
    <div class="desc">💐 בחרו דרך להעברת מתנה</div>

    <a class="card" href="https://links.payboxapp.com/sMQVA1jb0Ub">
      <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
      PayBox
    </a>

    <a class="card" href="https://www.bitpay.co.il/app/me/DCF1C51B-CB29-5C26-7258-5EF6B952E2ACE24A">
      <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
      Bit
    </a>
  </div>
</div>

<!-- טל -->
<div class="side tal">
  <div class="box">
    <div class="name">טל</div>
    <div class="desc">🥂 בחרו דרך להעברת מתנה</div>

    <a class="card" href="https://links.payboxapp.com/4BKtCQg9XUb">
      <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
      PayBox
    </a>

    <a class="card" href="https://www.bitpay.co.il/app/me/24CD84B1-FA1A-1862-2D28-ECC3C74D66B8432A">
      <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
      Bit
    </a>
  </div>
</div>

</body>
</html>

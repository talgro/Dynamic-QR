<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>בחירת יעד</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Assistant', sans-serif;
      height: 100vh;
      display: flex;
    }

    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: white;
      font-size: 26px;
      font-weight: 500;
      transition: all 0.2s ease;
      position: relative;
    }

    .half:hover {
      filter: brightness(1.05);
      transform: scale(1.01);
    }

    .tal {
      background: linear-gradient(135deg, #6a85f1, #9bb1ff);
    }

    .natali {
      background: linear-gradient(135deg, #f7a8c4, #ffd1dc);
    }

    .content {
      text-align: center;
    }

    .small {
      font-size: 16px;
      opacity: 0.9;
      margin-top: 6px;
    }

    /* Mobile: הופך לעמודה */
    @media (max-width: 600px) {
      body {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<a class="half tal" href="https://example.com/tal">
  <div class="content">
    טל
    <div class="small">לחצו להמשך</div>
  </div>
</a>

<a class="half natali" href="https://example.com/natali">
  <div class="content">
    נטלי
    <div class="small">לחצו להמשך</div>
  </div>
</a>

</body>
</html>

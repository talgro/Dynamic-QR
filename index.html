<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מתנה לחתונה</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Assistant', sans-serif;
      height: 100vh;
      display: flex;
    }

    .half {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
      text-align: center;
      color: white;
    }

    .natali {
      background: linear-gradient(135deg, #f7a8c4, #ffd1dc);
    }

    .tal {
      background: linear-gradient(135deg, #6a85f1, #9bb1ff);
    }

    .content {
      max-width: 280px;
      width: 100%;
    }

    .name {
      font-size: 34px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .desc {
      font-size: 15px;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .btn {
      display: block;
      background: rgba(255,255,255,0.9);
      color: #333;
      text-decoration: none;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: white;
    }

    /* מובייל */
    @media (max-width: 700px) {
      body {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<!-- נטלי -->
<a class="half natali">
  <div class="content">
    <div class="name">נטלי</div>
    <div class="desc">💐 בחירת דרך להעברת מתנה</div>

    <a class="btn" href="https://links.payboxapp.com/sMQVA1jb0Ub">
      PayBox – נטלי
    </a>

    <a class="btn" href="https://www.bitpay.co.il/app/me/DCF1C51B-CB29-5C26-7258-5EF6B952E2ACE24A">
      Bit – נטלי
    </a>
  </div>
</a>

<!-- טל -->
<a class="half tal">
  <div class="content">
    <div class="name">טל</div>
    <div class="desc">🥂 בחירת דרך להעברת מתנה</div>

    <a class="btn" href="https://links.payboxapp.com/4BKtCQg9XUb">
      PayBox – טל
    </a>

    <a class="btn" href="https://www.bitpay.co.il/app/me/24CD84B1-FA1A-1862-2D28-ECC3C74D66B8432A">
      Bit – טל
    </a>
  </div>
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>טל & נטלי 💍</title>

  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Assistant', sans-serif;
      background: linear-gradient(135deg, #f7f3ef, #eef3ff);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* הכרטיס */
    .card {
      width: 92%;
      max-width: 900px;
      height: 520px;
      background: white;
      border-radius: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      display: flex;
      overflow: hidden;
    }

    /* צד שמאל / ימין */
    .side {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
    }

    .natali {
      background: linear-gradient(135deg, #fff1f5, #ffe4ec);
    }

    .tal {
      background: linear-gradient(135deg, #eef3ff, #dde6ff);
    }

    /* תוכן עליון */
    .header {
      position: absolute;
      top: 30px;
      text-align: center;
      width: 100%;
      pointer-events: none;
    }

    .title {
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .date {
      font-size: 14px;
      color: #777;
      margin-bottom: 6px;
    }

    .message {
      font-size: 14px;
      color: #666;
    }

    /* כפתורים */
    .box {
      width: 100%;
      max-width: 320px;
      display: flex;
      gap: 14px;
      justify-content: center;
    }

    .btn {
      flex: 1;
      background: white;
      border-radius: 16px;
      padding: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.06);
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.10);
    }

    .logo {
      height: 26px;
      width: auto;
    }

    /* מובייל */
    @media (max-width: 800px) {
      .card {
        flex-direction: column;
        height: auto;
      }

      html, body {
        overflow: auto;
      }

      .header {
        position: static;
        margin-bottom: 20px;
      }
    }
  </style>
</head>

<body>

<div class="card">

  <!-- נטלי -->
  <div class="side natali">
    <div class="content">
      <div class="box">

        <a class="btn" href="https://links.payboxapp.com/sMQVA1jb0Ub">
          <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
        </a>

        <a class="btn" href="https://www.bitpay.co.il/app/me/DCF1C51B-CB29-5C26-7258-5EF6B952E2ACE24A">
          <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
        </a>

      </div>
    </div>
  </div>

  <!-- טל -->
  <div class="side tal">
    <div class="content">
      <div class="box">

        <a class="btn" href="https://links.payboxapp.com/4BKtCQg9XUb">
          <img class="logo" src="Pay-box-logo@3x.webp" alt="PayBox">
        </a>

        <a class="btn" href="https://www.bitpay.co.il/app/me/24CD84B1-FA1A-1862-2D28-ECC3C74D66B8432A">
          <img class="logo" src="Bit_logo_2024.svg" alt="Bit">
        </a>

      </div>
    </div>
  </div>

</div>

<!-- Header מעל הכרטיס -->
<div class="header">
  <div class="title">טל גרופר & נטלי גבאי 💍</div>
  <div class="date">26.6.26</div>
  <div class="message">אנחנו כל כך מתרגשים לחגוג איתכם את היום שלנו. תודה שאתם כאן איתנו 💐</div>
</div>

</body>
</html>
